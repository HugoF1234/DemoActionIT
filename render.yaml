services:
  - type: web
    name: lexia-crm-demo
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SINCH_KEY_ID
        sync: false
      - key: SINCH_KEY_SECRET
        sync: false
      - key: SINCH_PROJECT_ID
        sync: false
      - key: SINCH_APP_ID
        sync: false
      - key: SINCH_SENDER_ID
        sync: false
